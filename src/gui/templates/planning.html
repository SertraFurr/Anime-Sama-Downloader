<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Planning | Anime-Sama CLI GUI</title>
    <link rel="stylesheet" href="/static/base.css">
    <link rel="stylesheet" href="/static/planning.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <style>
        /* Animation de chargement pour HTMX */
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/gui/static" class="nav-brand">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
            AS Downloader
        </a>

        <div class="search-container">
            <div class="search-input-wrapper">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <label>
                    <input type="search"
                           name="q"
                           class="search-input"
                           placeholder="Rechercher un anime..."
                           autocomplete="off"
                           hx-get="/api/v1/search"
                           hx-trigger="input changed delay:500ms, search"
                           hx-target="#search-results">
                </label>
            </div>
            <div id="search-results" class="search-dropdown"></div>
        </div>

        <div class="nav-links">
            <a href="/gui/static" class="nav-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" /></svg>
                Dashboard
            </a>
            <a href="/planning" class="nav-link active">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5m-9-6h.008v.008H12v-.008zM12 15h.008v.008H12V15zm0 2.25h.008v.008H12v-.008zM9.75 15h.008v.008H9.75V15zm0 2.25h.008v.008H9.75v-.008zM7.5 15h.008v.008H7.5V15zm0 2.25h.008v.008H7.5v-.008zm6.75-4.5h.008v.008h-.008v-.008zm0 2.25h.008v.008h-.008V15zm0 2.25h.008v.008h-.008v-.008zm2.25-4.5h.008v.008H16.5v-.008zm0 2.25h.008v.008H16.5V15z" /></svg>
                Planning
            </a>
            <a href="/settings" class="nav-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                Paramètres
            </a>
        </div>
    </nav>

    <div class="planning-container">
        <div class="planning-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" style="margin-right: 10px;" viewBox="0 0 24 24"></svg>
            <h1>Planning</h1>

            <svg id="loading-spinner" class="htmx-indicator" style="margin-left: 1rem; color: var(--accent); animation: spin 1s linear infinite;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
        </div>

        <div class="filters-wrapper" hx-target="#planning-grid" hx-indicator="#loading-spinner">
            <span class="filter-label">Filtrer par langue :</span>
            <button class="filter-btn active" hx-get="/api/v1/planning-content?lang=all" onclick="updateActiveBtn(this)">Tous</button>
            <button class="filter-btn" hx-get="/api/v1/planning-content?lang=fr" onclick="updateActiveBtn(this)">🇫🇷 FR (VF)</button>
            <button class="filter-btn" hx-get="/api/v1/planning-content?lang=jp" onclick="updateActiveBtn(this)">🇯🇵 JP (VOSTFR)</button>
            <button class="filter-btn" hx-get="/api/v1/planning-content?lang=ch" onclick="updateActiveBtn(this)">🇨🇳 CH (VCN)</button>
            <button class="filter-btn" hx-get="/api/v1/planning-content?lang=en" onclick="updateActiveBtn(this)">🇺🇸 EN (VA)</button>
        </div>

        <div id="planning-grid" class="days-wrapper" hx-get="/api/v1/planning-content?lang=all" hx-trigger="load">
            </div>
    </div>

    <script>
        function updateActiveBtn(clickedBtn) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            clickedBtn.classList.add('active');
        }

        document.addEventListener('click', (e) => {
            const container = document.querySelector('.search-container');
            const dropdown = document.getElementById('search-results');
            if (container && !container.contains(e.target)) {
                dropdown.innerHTML = '';
            }
        });
    </script>
</body>
</html>
