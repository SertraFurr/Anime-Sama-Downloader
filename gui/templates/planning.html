                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />

                Paramètres
            </a>

    </nav>

    <div class="planning-container">
        <div class="planning-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" style="margin-right: 10px;" viewBox="0 0 24 24">
                </svg>
            <h1>Planning</h1>
        </div>

        <div class="filters-wrapper">
            <span class="filter-label">Filtrer par langue :</span>
            <button class="filter-btn active" data-filter="all">Tous</button>
            <button class="filter-btn" data-filter="fr">🇫🇷 FR (VF)</button>
            <button class="filter-btn" data-filter="jp">🇯🇵 JP (VOSTFR)</button>
            <button class="filter-btn" data-filter="ch">🇨🇳 CH (VCN)</button>
            <button class="filter-btn" data-filter="en">🇺🇸 EN (VA)</button>
        </div>

        <div class="days-wrapper" hx-get="/api/v1/planning-content" hx-trigger="load">
            <div style="text-align: center; width: 100%; padding: 3rem; color: var(--accent);">
                <svg class="animate-spin" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="animation: spin 1s linear infinite;">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                <p>Récupération du planning...</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const filterBtns = document.querySelectorAll('.filter-btn');
            const animeCards = document.querySelectorAll('.anime-card');

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const selectedLang = btn.getAttribute('data-filter');

                    animeCards.forEach(card => {
                        const cardLang = card.getAttribute('data-lang');
                        if (selectedLang === 'all' || cardLang === selectedLang) {
                            card.style.display = 'block';
                        } else {
                            card.style.display = 'none';
                        }
                    });
                });
            });
        });
    </script>
</body>
</html>
